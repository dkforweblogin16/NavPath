<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <!-- Compass circle -->
  <circle cx="30" cy="30" r="24" stroke="#c9a84c" stroke-width="2" fill="#0a192f"/>
  <circle cx="30" cy="30" r="18" stroke="#1e3a5f" stroke-width="1" fill="none"/>
  <!-- N marker -->
  <text x="30" y="14" text-anchor="middle" fill="#c9a84c" font-size="6" font-family="serif" font-weight="bold">N</text>
  <text x="30" y="50" text-anchor="middle" fill="#4a6fa5" font-size="5" font-family="serif">S</text>
  <text x="50" y="32" text-anchor="middle" fill="#4a6fa5" font-size="5" font-family="serif">E</text>
  <text x="10" y="32" text-anchor="middle" fill="#4a6fa5" font-size="5" font-family="serif">W</text>
  <!-- Compass needle -->
  <polygon points="30,14 27,30 30,28 33,30" fill="#c9a84c"/>
  <polygon points="30,46 27,30 30,32 33,30" fill="#4a6fa5"/>
  <!-- Center dot -->
  <circle cx="30" cy="30" r="2.5" fill="#c9a84c"/>
  <!-- App name -->
  <text x="64" y="26" fill="white" font-size="22" font-family="'Georgia', serif" font-weight="bold" letter-spacing="-0.5">Nav</text>
  <text x="97" y="26" fill="#c9a84c" font-size="22" font-family="'Georgia', serif" font-weight="bold" letter-spacing="-0.5">Path</text>
  <text x="64" y="42" fill="#7a9cc0" font-size="9" font-family="sans-serif" letter-spacing="2">NEA EXAM PREP</text>
</svg>
